version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: andes-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: andes-deposits
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - andes-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: andes-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/andes-deposits?authSource=admin
      MASTER_MNEMONIC: ${MASTER_MNEMONIC}
      RPC_ETHEREUM: ${RPC_ETHEREUM}
      RPC_BSC: ${RPC_BSC}
      RPC_POLYGON: ${RPC_POLYGON}
      RPC_TRON: ${RPC_TRON}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      PORT: 3001
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - andes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    driver: local

networks:
  andes-network:
    driver: bridge
